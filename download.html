<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download db.json</title>
</head>
<body>
<script>
window.addEventListener("load", async () => {
    try {
        const jsonUrl = "https://raw.githubusercontent.com/nicopancakes/nepafreq.org/refs/heads/main/data/db.json";
        const response = await fetch(jsonUrl);
        if (!response.ok) {
            throw new Error("Failed to fetch JSON");
        }
        const data = await response.text();
        const blob = new Blob([data], {
            type: "application/json"
        });
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = "database_nepafreq.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(blobUrl);

    } catch (err) {
        console.error(err);
    }
});
</script>

</body>
</html>

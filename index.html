<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NEPA Radio - Frequency reference for Pike, Monroe, and Lackawanna counties in Northeast Pennsylvania. Public safety, police, fire, EMS, and amateur radio channels.">
<title>NEPA Radio DB</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');

:root { --accent: #00cc88; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Inter', system-ui, sans-serif;
  line-height: 1.7;
  scroll-behavior: smooth;
}

header {
  background: #111111;
  border-bottom: 3px solid var(--accent);
  padding: 1.25rem 5%;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: flex-end;
  font-family: 'Roboto Mono', monospace;
  font-weight: 600;
  letter-spacing: -1px;
  color: #ffffff;
  gap: 6px;
}

.logo .nepa, .logo .radio { font-size: 2.5rem; line-height: 1; }

.logo .org {
  font-size: 1.35rem;
  font-weight: 500;
  color: var(--accent);
  padding-bottom: 7px;
}

nav { display: flex; gap: 2.25rem; }

nav a {
  color: #e0e0e0;
  text-decoration: none;
  font-weight: 500;
  font-size: 1.05rem;
}

nav a:hover { color: var(--accent); }

.hero {
  background: #111111;
  padding: 5rem 5% 3.5rem;
  text-align: center;
}

.hero h1 {
  font-size: 3.2rem;
  line-height: 1.1;
  margin-bottom: 1rem;
  color: #ffffff;
}

.hero .tagline {
  font-size: 1.35rem;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 1.75rem;
}

.hero p {
  max-width: 680px;
  margin: 0 auto;
  font-size: 1.15rem;
  opacity: 0.85;
}

.counties {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-top: 2.5rem;
  flex-wrap: wrap;
}

.county {
  background: #1a1a1a;
  border: 2px solid var(--accent);
  padding: 0.65rem 2rem;
  border-radius: 8px;
  font-weight: 600;
}

main {
  padding: 3rem 5%;
  max-width: 1280px;
  margin: 0 auto;
}

.section-title {
  font-size: 1.85rem;
  margin-bottom: 1.5rem;
}

.search-box {
  max-width: 620px;
  margin: 0 auto 1.5rem;
}

.search-box input {
  width: 100%;
  padding: 1.1rem 1.5rem;
  background: #1a1a1a;
  border: 2px solid #333;
  border-radius: 8px;
  color: #e0e0e0;
}

.search-box input:focus {
  border-color: var(--accent);
  outline: none;
}

.county-filters {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

.filter-btn {
  background: #1a1a1a;
  border: 2px solid #333;
  color: #e0e0e0;
  padding: 0.7rem 1.5rem;
  border-radius: 8px;
  cursor: pointer;
}

.filter-btn.active {
  background: var(--accent);
  color: #000;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
}

th, td {
  padding: 1.1rem 1.5rem;
  border-bottom: 1px solid #222;
}

th {
  background: #1a1a1a;
  color: #aaa;
}

.freq {
  font-family: 'Roboto Mono', monospace;
  color: var(--accent);
  font-size: 1.2rem;
}

.county-tag {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.85rem;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 2rem;
  margin-top: 3rem;
}

.card {
  background: #111;
  border: 1px solid #222;
  padding: 2rem;
  border-radius: 8px;
}

footer {
  text-align: center;
  padding: 3rem 5%;
  background: #111;
  border-top: 3px solid var(--accent);
  color: #888;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <span class="nepa">NEPA</span>
    <span class="radio">RADIO</span>
    <span class="org">.org</span>
  </div>

  <nav>
    <a href="https://neparadio.org">HOME</a>
    <a href="https://neparadio.org/freq">FREQUENCIES</a>
    <a href="https://neparadio.org/about">ABOUT</a>
  </nav>
</header>

<section class="hero">
  <h1>Northeast Pennsylvania<br>Radio Frequency Reference</h1>
  <div class="tagline">Pike - Monroe - Lackawanna - Wayne</div>
</section>

<main>
  <h2 class="section-title" id="frequency-database">Frequency Database</h2>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search frequencies...">
  </div>

  <div class="county-filters">
    <button class="filter-btn active" data-county="all">All</button>
    <button class="filter-btn" data-county="Pike">Pike</button>
    <button class="filter-btn" data-county="Monroe">Monroe</button>
    <button class="filter-btn" data-county="Lackawanna">Lackawanna</button>
  </div>

  <table id="freqTable">
    <thead>
      <tr>
        <th>FREQ</th>
        <th>SERVICE</th>
        <th>COUNTY</th>
        <th>DESCRIPTION</th>
        <th>CHECKED</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</main>

<footer>
  NEPA Radio ~ Frequencies compiled from public sources
</footer>

<script>
   const frequencies = [

  { freq:"155.895", service:"Transportation", county:"Wayne", desc:"County Transport/Paging", checked:"2026" },

  // Municipal Wayne
  { freq:"159.1875", service:"Public Works", county:"Wayne", desc:"Damascus DPW", checked:"2026" },
  { freq:"159.390", service:"Public Works", county:"Wayne", desc:"Greene DPW", checked:"2026" },
  { freq:"155.0425", service:"Police Tac", county:"Wayne", desc:"Hawley Police", checked:"2026" },
  { freq:"155.820", service:"Police Tac", county:"Wayne", desc:"Honesdale Police", checked:"2026" },

  { freq:"453.5875", service:"Fireground", county:"Monroe", desc:"Fireground 1", checked:"2026" },
  { freq:"458.5875", service:"Fireground", county:"Monroe", desc:"Fireground 2", checked:"2026" },
  { freq:"453.6375", service:"Fireground", county:"Monroe", desc:"Fireground 3", checked:"2026" },
  { freq:"458.6375", service:"Fireground", county:"Monroe", desc:"Fireground 4", checked:"2026" },
  { freq:"453.7125", service:"Fireground", county:"Monroe", desc:"Fireground 5", checked:"2026" },
  { freq:"458.7125", service:"Fireground", county:"Monroe", desc:"Fireground 6", checked:"2026" }
];

let currentCountyFilter = "all";

function renderTable(data) {
  const tbody = document.querySelector("#freqTable tbody");

  tbody.innerHTML = data.map(item => `
    <tr>
      <td><span class="freq">${item.freq}</span></td>
      <td>${item.service}</td>
      <td>${item.county}</td>
      <td>${item.desc}</td>
      <td>${item.checked}</td>
    </tr>
  `).join("");
}

function filterFrequencies() {
  let filtered = [...frequencies];

  if (currentCountyFilter !== "all") {
    filtered = filtered.filter(f => f.county === currentCountyFilter);
  }

  const term = document.getElementById("searchInput").value.toLowerCase();

  if (term) {
    filtered = filtered.filter(f =>
      f.freq.includes(term) ||
      f.service.toLowerCase().includes(term) ||
      f.county.toLowerCase().includes(term) ||
      f.desc.toLowerCase().includes(term)
    );
  }

  renderTable(filtered);
}

document.addEventListener("DOMContentLoaded", () => {
  renderTable(frequencies);

  document.getElementById("searchInput").addEventListener("input", filterFrequencies);

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentCountyFilter = btn.dataset.county;
      filterFrequencies();
    });
  });
});
</script>

</body>
</html>
